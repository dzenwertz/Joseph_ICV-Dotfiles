# Tmux Configuration - Minimalist & Catppuccin Mocha
# Optimized for ease of use, network monitoring, and security labs.

# Set prefix to Control + Space (much easier to press than Ctrl+b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable mouse support (resizing, scrolling, selection)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# Automatically rename windows to reflect current program
setw -g automatic-rename on
set -g renumber-windows on

# Reduce escape time for faster key responses in Neovim
set -sg escape-time 10

# Intuitive pane splitting
# v splits vertically (columns), h splits horizontally (rows)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes easily using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload tmux configuration quickly
bind r source-file ~/.tmux.conf \; display-message "¡Configuración de Tmux recargada!"

# ==========================================
# CATPPUCCIN MOCHA THEME FOR TMUX
# ==========================================

# Status bar options
set -g status-position bottom
set -g status-justify left
set -g status-bg "#181825"
set -g status-fg "#cdd6f4"

# Panes border colors
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#b4befe"

# Window list style
setw -g window-status-style fg="#a6adc8",bg="#181825"
setw -g window-status-current-style fg="#1e1e2e",bg="#cba6f7",bold
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Status left (Session name)
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]   #S #[fg=#89b4fa,bg=#181825] "

# Status right (Clock / Prefix indicator)
set -g status-right-length 50
set -g status-right "#[fg=#a6e3a1,bg=#181825]#{?client_prefix,#[fg=#f38ba8]  PREFIJO ,}#[fg=#b4befe,bg=#181825] 󰃭 %d/%m/%Y #[fg=#89b4fa,bg=#181825] 󱎫 %H:%M "
