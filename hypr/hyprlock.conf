# ==========================================
# Hyprlock Configuration - Catppuccin Mocha
# Premium Lofi Lockscreen
# ==========================================

background {
    monitor =
    path = /home/joseph/Pictures/Wallpapers/lofi_landscape.png
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(cba6f7) # Mauve
    font_size = 100
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B" | sed 's/\(.\)/\u\1/')"
    color = rgb(cdd6f4) # Text
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hola, Joseph!
    color = rgb(b4befe) # Lavender
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(b4befe) # Lavender
    inner_color = rgb(1e1e2e) # Base
    font_color = rgb(cdd6f4) # Text
    fade_on_empty = true
    placeholder_text = <span foreground="##a6adc8">Contraseña...</span>
    hide_input = false
    position = 0, -90
    halign = center
    valign = center
}
