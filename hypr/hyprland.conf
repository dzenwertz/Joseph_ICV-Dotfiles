# Hyprland Configuration - Minimalist & Catppuccin Mocha Theme
# Tailored for CachyOS Linux

# ==========================================
# MONITOR CONFIGURATION
# ==========================================
# Detects monitor automatically and sets optimal resolution & refresh rate
monitor=,preferred,auto,1

# ==========================================
# AUTOSTART PROGRAMS
# ==========================================
# Start status bar, notification daemon, wallpaper utility, and polkit agent
exec-once = waybar
exec-once = dunst
exec-once = awww-daemon
exec-once = hypridle
exec-once = /usr/lib/polkit-kde-authentication-agent-1 # Plasma polkit agent

# Set default wallpaper (Catppuccin Mocha lofi cabin)
exec-once = sleep 1 && awww img ~/Pictures/Wallpapers/catppuccin_lofi.png

# ==========================================
# ENVIRONMENT VARIABLES
# ==========================================
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11

# ==========================================
# INPUT SETTINGS
# ==========================================
input {
    # Spanish Keyboard Layout
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# ==========================================
# CURSOR SETTINGS (NVIDIA FIX)
# ==========================================
cursor {
    no_hardware_cursors = true
}

# ==========================================
# GENERAL LOOK & FEEL
# ==========================================
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    # Catppuccin Mocha gradient: Mauve to Lavender
    col.active_border = rgb(cba6f7) rgb(b4befe) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle
}

# ==========================================
# DECORATIONS (Blur & Corners)
# ==========================================
decoration {
    rounding = 10

    # Opacity active/inactive
    active_opacity = 0.98
    inactive_opacity = 0.90

    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ==========================================
# ANIMATIONS (Smooth & Minimalist)
# ==========================================
animations {
    enabled = true

    # Cubic Bezier Curves (Custom, fluid)
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = winBezier, 0.3, 1.4, 0.1, 1.0

    animation = windows, 1, 5, winBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, myBezier, slide
}

# ==========================================
# LAYOUTS (Dwindle)
# ==========================================
dwindle {
    preserve_split = true # keep split layout when moving/changing
}

# ==========================================
# WINDOW RULES (Esthetics & Floating)
# ==========================================
windowrule = match:class ^(kitty)$, opacity 0.85
windowrule = match:class ^(rofi)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on

# ==========================================
# KEYBINDINGS (Shortcuts)
# ==========================================
$mainMod = SUPER

# Applications
bind = $mainMod, Return, exec, kitty
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, dolphin # Plasma's file explorer
bind = $mainMod, D, exec, rofi -show drun # Launcher
bind = $mainMod, B, exec, brave || firefox || chromium # Browser fallback
bind = $mainMod, W, exec, ~/.local/bin/wallpaper_selector.sh # Wallpaper selector
bind = $mainMod SHIFT, W, exec, ~/.local/bin/random_wallpaper.sh # Random wallpaper (Shuffle)
bind = $mainMod, Escape, exec, ~/.local/bin/powermenu.sh # Power menu
bind = $mainMod, M, exec, ~/.local/bin/desktop_menu.sh # Desktop menu (Rofi)
bind = $mainMod, mouse:274, exec, ~/.local/bin/desktop_menu.sh # Desktop menu via Super + Middle Click

# Window Management
bind = $mainMod, Q, killactive, # Close current window
bind = $mainMod SHIFT, Q, exit, # Quit Hyprland
bind = $mainMod, Space, togglefloating, # Toggle float mode
bind = $mainMod, F, fullscreen, # Toggle Fullscreen
bind = $mainMod, P, pseudo, # dwindle (pseudotile)
bind = $mainMod, J, layoutmsg, togglesplit # dwindle (split)

# Screenshots (grim + slurp + wl-copy)
# Regional selection directly to clipboard (press Print or Super+Print, select area, then paste anywhere)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod ALT, L, exec, hyprlock # Lock screen

# Focus Navigation (Vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & Brightness Control (Laptop keys & fallbacks)
# Laptop multimedia keys (often Fn + F-keys or Arrows)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Fallbacks for notebooks: Super + Up/Down for Volume, Super + Shift + Up/Down for Brightness
bindel = $mainMod, Up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, Down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod SHIFT, Up, exec, brightnessctl set 5%+
bindel = $mainMod SHIFT, Down, exec, brightnessctl set 5%-
