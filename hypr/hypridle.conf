# ==========================================
# Hypridle Configuration - Catppuccin Mocha
# Battery friendly idle management
# ==========================================

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after wake
}

# Lock screen after 5 minutes
listener {
    timeout = 300                                 # 5 mins
    on-timeout = loginctl lock-session            # command to run on timeout
}

# Turn off display after 10 minutes
listener {
    timeout = 600                                 # 10 mins
    on-timeout = hyprctl dispatch dpms off        # command to run on timeout
    on-resume = hyprctl dispatch dpms on          # command to run on resume
}

# Suspend after 15 minutes
listener {
    timeout = 900                                 # 15 mins
    on-timeout = systemctl suspend                # command to run on timeout
}
