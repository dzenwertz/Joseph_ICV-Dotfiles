# Starship Prompt - Minimalist & Catppuccin Mocha Theme
# Configured for clean layout, high performance, and useful git/status context.

format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$golang\
$c\
$cmd_duration\
$line_break\
$character"""

# Disable the line break between prompts if you prefer a single line
add_newline = false

# Character (The prompt symbol)
[character]
success_symbol = "[❯](bold lavender)"
error_symbol = "[❯](bold red)"

# Directory (Current path)
[directory]
style = "bold blue"
read_only = " 󰌾"
truncation_length = 3
truncation_symbol = "../"

# Git Branch
[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

# Git Status
[git_status]
style = "bold red"
format = "[\\[$all_status$ahead_behind\\]]($style) "
conflicted = "󰞇 "
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "? "
stashed = "$ "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

# Command Duration
[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "took [$duration]($style) "

# Programming Languages (Useful for university and coding)
[python]
symbol = " "
style = "bold green"
format = "via [$symbol$version]($style) "

[rust]
symbol = " "
style = "bold red"
format = "via [$symbol$version]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "via [$symbol$version]($style) "


[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#585b70"
overlay1 = "#45475a"
overlay0 = "#313244"
surface2 = "#45475a"
surface1 = "#313244"
surface0 = "#1e1e2e"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Apply the palette
palette = "catppuccin_mocha"
